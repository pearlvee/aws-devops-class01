version: 0.2

env:
  parameter-store:
    API_URL: "/myapp/development/api-url"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo '=== Installing dependencies ==='
      - npm install
  pre_build:
    commands:
      - npm test -- --coverage --coverageReporters=text
      - echo '=== Running security audit ==='
      - npm audit --audit-level=high
        # Build fails here if high or critical vulnerabilities are found
      - echo '=== Security audit passed ==='
      - npm run lint
      - npm audit --json > security-report.json || true
      - npm audit --audit-level=high # this one actually fails the build
  build:
    commands:
      - echo "Building against API:$API_URL"
      - echo '=== Building application ==='
      - npm run build
  post_build:
    commands:
      - echo '=== Running smoke tests ==='
      - node -e "require('./build/server.js'); console.log('Smoke test passed'); process.exit(0)"
      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
    - security-report.json
  base-directory: build
  

cache:
  paths:
    - 'node_modules/**/*'