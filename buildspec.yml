version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      # The --no-cache flag forces npm to go to the internet
      - npm install --no-cache
  pre_build:
    commands:
      - npm test -- --coverage --coverageReporters=text
      # Build fails here if coverage < 70%
  build:
    commands:
      - echo '=== Building application ===',
      - npm run build
  post_build:
    commands:
      - echo '=== Running smoke tests ==='
      - node -e "require('./build/server.js'); console.log('Smoke test passed'); process.exit(0)"
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: build

cache:
  paths:
    - 'node_modules/**/*'
