version: 0.2

env:
  parameter-store:
    API_URL: "/myapp/development/api-url"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo '=== Installing dependencies ==='
      - npm install
      - npm audit fix
  pre_build:
    commands:
      - npm test -- --coverage --coverageReporters=text
      - echo '=== Running security audit ==='
      - npm audit --audit-level=high
      - echo '=== Security audit passed ==='
      - npm run lint
      - npm audit --json > security-report.json || true
  build:
    commands:
      - echo "Building against API:$API_URL"
      - echo '=== Building application ==='
      - npm run build
  post_build:
    commands:
      - echo '=== Running smoke tests ==='
      - node -e "require('./build/server.js'); console.log('Smoke test passed'); process.exit(0)"
      - echo "Build completed on $(date)"
      - cp security-report.json build/
reports:
  MyAppTestReport:
    files:
      - 'build/test-report.xml'
    file-format: JUNITXML

artifacts:
  files:
    - '**/*'
  base-directory: build

cache:
  paths:
    - 'node_modules/**/*'