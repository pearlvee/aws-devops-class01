version: 0.2

env:
  parameter-store:
    API_URL: "/myapp/development/api-url"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo '=== Installing dependencies ==='
      - npm install
  pre_build:
    commands:
      - npm test -- --coverage --coverageReporters=text
  build:
    commands:
      - echo "This command will fail this stage"
      - thisisnotacommand
      - npm run build
  post_build:
    commands:
      - echo '=== Running smoke tests ==='
      - node -e "require('./build/server.js'); console.log('Smoke test passed'); process.exit(0)"
      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
  base-directory: build

cache:
  paths:
    - 'node_modules/**/*'