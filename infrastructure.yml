AWSTemplateFormatVersion: '2010-09-09'
Description: Simple S3 static website

Parameters:
  Environment:
    Type: String
    Default: development

Resources:
  WebsiteBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'myapp-website-${Environment}-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html

Outputs:
  BucketName:
    Value: !Ref WebsiteBucket